[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: Tests that take more than 2 seconds
    network: Tests that require network access
    ui: Tests that require a Qt display
    server_real: Tests that require the production server or real model
filterwarnings =
    ignore::DeprecationWarning
log_cli = false
addopts = -v --strict-markers
timeout = 300
