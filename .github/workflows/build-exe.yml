name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 matplotlib requests pyinstaller

      - name: Build EXE
        working-directory: client
        run: |
          pyinstaller spectrum-matcher.spec

      - name: Package artifact
        shell: pwsh
        run: |
          cd client/dist
          Compress-Archive -Path 'NMR-Spectrum-Matcher' -DestinationPath '../../NMR-Spectrum-Matcher-win64.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NMR-Spectrum-Matcher-win64
          path: NMR-Spectrum-Matcher-win64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NMR-Spectrum-Matcher-win64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
