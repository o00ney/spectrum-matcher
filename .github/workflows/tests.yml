name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server-test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-multipart matplotlib numpy scipy
          pip install pytest pytest-cov pytest-timeout httpx
      - name: Run server unit tests
        run: |
          PYTHONPATH="server:tests" pytest tests/server/ -v \
            --cov=server --cov-report=xml --cov-report=term \
            --timeout=30
      - name: Run client non-Qt tests
        run: |
          PYTHONPATH="client:tests" pytest tests/client/test_config.py tests/client/test_settings.py -v \
            --timeout=30 || echo "Qt tests skipped in headless"
      - name: Run integration tests
        run: |
          PYTHONPATH="client:server:tests" pytest tests/integration/ -v \
            -k "not real" --timeout=30
      - name: Run edge case tests
        run: |
          PYTHONPATH="client:server:tests" pytest tests/edge_cases/ -v --timeout=30
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: server
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
